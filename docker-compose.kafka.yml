x-kafka-common: &kafka-common
  image: apache/kafka:latest
  environment:
    # Với Apache Image, dùng KAFKA_ thay vì KAFKA_CFG_
    KAFKA_NODE_ID: 1
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
    KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
    KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    KAFKA_LOG_RETENTION_HOURS: 168
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
  volumes:
    - kafka-data:/var/lib/kafka/data # Lưu ý path của Apache khác Bitnami
  networks:
    - finance_network
  healthcheck:
    test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
    interval: 15s
    timeout: 10s
    retries: 5
  restart: unless-stopped

services:
  kafka:
    <<: *kafka-common
    ports:
      - "9092:9092"
    profiles: [kafka, full]
    # XÓA depends_on kafka-ui ở đây

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: 'true'
    networks:
      - finance_network
    depends_on:
      kafka:
        condition: service_healthy # UI đợi Kafka mới đúng logic
    profiles: [kafka-ui, full, monitoring]

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: schema-registry
    ports:
      - "8082:8082"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8082
    networks:
      - finance_network
    depends_on:
      kafka:
        condition: service_healthy
    profiles: [schema-registry, full]

volumes:
  kafka-data:

networks:
  finance_network:
    external: true